function shuffle(arr) {
  const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a;
}

/* ─── RAINBOW RINGS ─────────────────────────────────────────── */
function RainbowRings({ size = 12 }) {
  return (
    <span style={{
      display:'inline-block', width:size, height:size, borderRadius:'50%',
      background:'#FF4757', flexShrink:0,
      boxShadow:`0 0 0 ${size*0.2}px #FF8C42,0 0 0 ${size*0.4}px #FFC93C,0 0 0 ${size*0.6}px #2ED573,0 0 0 ${size*0.8}px #2E9CFF,0 0 0 ${size*1.0}px #3D5AFE,0 0 0 ${size*1.2}px #B14AED`
    }}/>
  );
}

/* ─── STEP DOTS ─────────────────────────────────────────────── */
function StepDots({ active }) {
  return (
    <div style={{ display:'flex', gap:8, justifyContent:'center', padding:'10px 0 0' }}>
      {[1,2].map(n => (
        <div key={n} style={{
          width:6, height:6, borderRadius:'50%',
          background:'#1A1A1A',
          opacity: active===n ? 1 : 0.18,
          transform: active===n ? 'scale(1.5)' : 'scale(1)',
          transition:'all 0.3s cubic-bezier(0.2,0.8,0.2,1)',
        }}/>
      ))}
    </div>
  );
}

/* ─── DECK VISUAL ───────────────────────────────────────────── */
function DeckVisual({ icon, label, sub, onClick }) {
  const [hovered, setHovered] = React.useState(false);

    <div

      onMouseEnter={() => setHovered(true)}

      style={{ position:'relative', width:'min(200px, 52vw)', aspectRatio:'5/7', cursor:'pointer', userSelect:'none' }}
    >
      {[
        { r:-6, tx:-10, ty:6, op:0.45 },
        { r: 4, tx:  8, ty:3, op:0.65 },
      ].map((c,i) => (
        <div key={i} style={{
          position:'absolute', inset:0, borderRadius:20,
          background:'#fff', border:'1px solid rgba(0,0,0,0.07)',
          transform:`rotate(${c.r}deg) translate(${c.tx}px,${c.ty}px)`,
          opacity:c.op,
        }}/>
      ))}
      <div style={{
        position:'absolute', inset:0, borderRadius:20,
        background:'#fff', border:'1px solid rgba(0,0,0,0.06)',
        display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:14,

/* ─── EMOTION CARD ──────────────────────────────────────────── */
function EmotionCard({ emotion, group, onShown, animKey }) {
  const [revealed, setRevealed] = React.useState(false);
  const [entered, setEntered] = React.useState(false);
  React.useEffect(() => {
    setEntered(false); setRevealed(false);
    const t = setTimeout(() => { setEntered(true); if (onShown) onShown(); }, 60);
    return () => clearTimeout(t);
  }, [animKey]);
  const fontSize = emotion.length > 10 ? 'clamp(24px,7vw,34px)' : emotion.length > 7 ? 'clamp(30px,9vw,42px)' : 'clamp(36px,11vw,52px)';

  return (
    <div
      onMouseDown={() => setRevealed(true)}
      onMouseUp={() => setRevealed(false)}
      onMouseLeave={() => setRevealed(false)}
      onTouchStart={e => { e.preventDefault(); setRevealed(true); }}
      onTouchEnd={() => setRevealed(false)}
      style={{
        width:'min(220px, 56vw)', aspectRatio:'5/7', borderRadius:24,
        background:group.grad,
        display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
        position:'relative', overflow:'hidden',
        boxShadow:'0 32px 64px -24px rgba(0,0,0,0.3)',
        userSelect:'none', cursor:'pointer', touchAction:'none',
        transform: entered ? 'translateY(0) scale(1)' : 'translateY(24px) scale(0.95)',
        opacity: entered ? 1 : 0,
        transition:'transform 0.5s cubic-bezier(0.2,0.8,0.2,1), opacity 0.5s',
      }}
    >
      <div style={{
        color:group.text, fontWeight:900, fontSize, lineHeight:1, textAlign:'center', padding:'0 20px',
        filter: revealed ? 'blur(0)' : 'blur(20px)',
        transition: revealed ? 'filter 0.15s' : 'filter 0.4s',
      }}>{emotion}</div>

      <div style={{
        position:'absolute', inset:0,
        display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:10,
        opacity: revealed ? 0 : 1, transition:'opacity 0.2s', pointerEvents:'none',
      }}>
        <div style={{
          width:40, height:40, borderRadius:'50%',
          border:`1.5px solid ${group.text==='white'?'rgba(255,255,255,0.8)':'rgba(58,42,0,0.6)'}`,
          display:'flex', alignItems:'center', justifyContent:'center',

          color:group.text==='white'?'rgba(255,255,255,0.85)':'rgba(58,42,0,0.65)',
        }}>Görmek için<br/>dokun &amp; tut</div>
      </div>
    </div>
  );

/* ─── EMOTION SCREEN ────────────────────────────────────────── */
function EmotionScreen({ onScenePhase, onListOpen }) {
  const [phase, setPhase] = React.useState('deck');
  const [emotion, setEmotion] = React.useState(null);
  const [group, setGroup] = React.useState(null);
  const [animKey, setAnimKey] = React.useState(0);
  const [shuffled] = React.useState(() => {
    const all = GROUPS.flatMap(g => g.emotions.map(e => ({ emotion:e, group:g })));
    return shuffle(all);
  });
  const [idx, setIdx] = React.useState(0);

  function draw() {
    const item = shuffled[idx % shuffled.length];
    setEmotion(item.emotion); setGroup(item.group); setAnimKey(k=>k+1); setPhase('drawn');
  }
  function redraw() {
    const next = (idx+1) % shuffled.length; setIdx(next);
    const item = shuffled[next];
    setEmotion(item.emotion); setGroup(item.group); setAnimKey(k=>k+1);
  }

  const bg = group ? group.tint : '#FAF7F2';

  return (
    <div style={{ display:'flex', flexDirection:'column', flex:1, background:bg, transition:'background 0.8s cubic-bezier(0.2,0.8,0.2,1)' }}>
      {/* Header */}
      <div style={{ padding:'clamp(14px,4vw,20px) clamp(16px,5vw,24px) 0', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div style={{ fontWeight:900, fontSize:'clamp(16px,4.5vw,20px)', letterSpacing:'-0.02em', color:'#1A1A1A' }}>
          Duygu <em style={{ fontWeight:400, color:'#5A5A5A' }}>Dedektifi</em>
        </div>
        <button onClick={onListOpen} style={{
          width:42, height:42, borderRadius:'50%', background:'#fff', border:'1px solid rgba(0,0,0,0.08)',
          display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer',
          boxShadow:'0 4px 12px -4px rgba(0,0,0,0.1)', flexShrink:0,
        }}>
          <RainbowRings size={12} />
        </button>
      </div>

      <StepDots active={1} />

      {/* Content */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'clamp(16px,4vw,24px)', gap:'clamp(20px,5vw,32px)' }}>
        <div style={{ textAlign:'center' }}>
          <h1 style={{ fontWeight:400, fontStyle:'italic', fontSize:'clamp(22px,6vw,30px)', color:'#1A1A1A', marginBottom:8, lineHeight:1 }}>
            {phase === 'deck' ? 'Duygunu çek.' : 'Duygunla hazırlan.'}
          </h1>
          <p style={{ fontSize:'clamp(11px,3vw,13px)', color:'#5A5A5A', lineHeight:1.6, maxWidth:280 }}>
            {phase === 'deck'
              ? 'Desteye dokun, rastgele bir duygu atansın.'
              : 'Basılı tutarak sadece sen görebilirsin.'}
          </p>
        </div>

        {phase === 'deck' ? (
          <DeckVisual icon="?" label="Duygu Destesi" sub="70 Kart" onClick={draw} />
        ) : (
          <EmotionCard emotion={emotion} group={group} animKey={animKey} onShown={() => setPhase('ready')} />
        )}
      </div>

      {/* Actions */}
      <div style={{ padding:'0 clamp(16px,5vw,24px) calc(env(safe-area-inset-bottom,0px) + 24px)', display:'flex', gap:10, justifyContent:'center', flexWrap:'wrap', minHeight:64 }}>
        {phase === 'ready' && (
          <>
            <Btn ghost small onClick={redraw}>Başka Kart</Btn>
            <Btn small onClick={() => onScenePhase({ emotion, group })}>Sahne Zamanı →</Btn>
          </>
        )}
      </div>
    </div>
  );
}

/* ─── SCENE SCREEN ──────────────────────────────────────────── */
function SceneScreen({ emotionData, onRestart, onListOpen }) {
  const { emotion, group } = emotionData;
  const [shuffled] = React.useState(() => shuffle(SCENES));
  const [idx, setIdx] = React.useState(0);
  const scene = shuffled[idx % shuffled.length];

  return (
    <div style={{ display:'flex', flexDirection:'column', flex:1, background:'#FAF7F2' }}>
      {/* Header */}
      <div style={{ padding:'clamp(14px,4vw,20px) clamp(16px,5vw,24px) 0', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div style={{ fontWeight:900, fontSize:'clamp(16px,4.5vw,20px)', letterSpacing:'-0.02em', color:'#1A1A1A' }}>
          Duygu <em style={{ fontWeight:400, color:'#5A5A5A' }}>Dedektifi</em>
        </div>
        <button onClick={onListOpen} style={{
          width:42, height:42, borderRadius:'50%', background:'#fff', border:'1px solid rgba(0,0,0,0.08)',
          display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer',
          boxShadow:'0 4px 12px -4px rgba(0,0,0,0.1)', flexShrink:0,
        }}>
          <RainbowRings size={12} />
        </button>
      </div>

      <StepDots active={2} />

      {/* Scrollable */}
      <div style={{ flex:1, overflowY:'auto', padding:'clamp(14px,4vw,20px) clamp(16px,5vw,24px) 0', display:'flex', flexDirection:'column', gap:14 }}>
        <div style={{ display:'flex', justifyContent:'center' }}>
          <MiniChip emotion={emotion} group={group} />
        </div>
        <div style={{ textAlign:'center' }}>
          <h1 style={{ fontWeight:400, fontStyle:'italic', fontSize:'clamp(20px,5.5vw,28px)', color:'#1A1A1A', marginBottom:5, lineHeight:1 }}>
            Sahneyi aç.
          </h1>
          <p style={{ fontSize:'clamp(11px,3vw,13px)', color:'#5A5A5A', lineHeight:1.6 }}>
            Sahneyi oku, duyguyu üzerine giydir, soruyu cevapla.
          </p>
        </div>
        <SceneCard scene={scene} animKey={idx} />
        <div style={{ height:8 }}/>
      </div>

      {/* Actions */}
      <div style={{
        padding:'12px clamp(16px,5vw,24px) calc(env(safe-area-inset-bottom,0px) + 20px)',
        display:'flex', gap:10, justifyContent:'center', flexWrap:'wrap',
        borderTop:'1px solid rgba(0,0,0,0.06)', background:'#FAF7F2',
      }}>
        <Btn ghost small onClick={() => setIdx(i=>i+1)}>Başka Sahne</Btn>
        <Btn ghost small onClick={onRestart}>Yeni Tur</Btn>
      </div>
    </div>
  );
}

/* ─── EMOTION LIST OVERLAY ──────────────────────────────────── */
function EmotionListOverlay({ onClose }) {
  const [visible, setVisible] = React.useState(false);
  React.useEffect(() => { const t = setTimeout(() => setVisible(true), 30); return () => clearTimeout(t); }, []);

  return (
    <div style={{
      position:'fixed', inset:0,
      background:'#FAF7F2', display:'flex', flexDirection:'column',
      transform: visible ? 'translateY(0)' : 'translateY(100%)',
      transition:'transform 0.4s cubic-bezier(0.2,0.8,0.2,1)',
      zIndex:100,
    }}>
      <div style={{ padding:'clamp(16px,5vw,24px) clamp(16px,5vw,24px) 12px', display:'flex', alignItems:'center', justifyContent:'space-between', flexShrink:0 }}>
        <div>
          <div style={{ fontWeight:900, fontSize:'clamp(18px,5vw,22px)', color:'#1A1A1A' }}>Duygu Havuzu</div>
          <div style={{ fontSize:10, letterSpacing:'0.18em', textTransform:'uppercase', color:'#A0A0A0', marginTop:3, fontWeight:700 }}>70 duygu · 7 renk ailesi</div>
        </div>
        <button onClick={onClose} style={{
          width:38, height:38, borderRadius:'50%', background:'rgba(0,0,0,0.07)',
          border:'none', fontSize:20, cursor:'pointer',
          display:'flex', alignItems:'center', justifyContent:'center', color:'#1A1A1A', fontFamily:'Nunito',
        }}>×</button>
      </div>

      <div style={{ flex:1, overflowY:'auto', padding:'0 clamp(16px,5vw,24px) calc(env(safe-area-inset-bottom,0px) + 24px)' }}>
        {GROUPS.map((g, gi) => (
          <div key={gi} style={{ marginBottom:28 }}>
            <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:12 }}>
              <div style={{ width:12, height:12, borderRadius:'50%', background:g.grad, flexShrink:0 }}/>
              <span style={{ fontSize:9, letterSpacing:'0.22em', textTransform:'uppercase', color:'#A0A0A0', fontWeight:700 }}>
                {g.name} Duygular
              </span>
            </div>
            <div style={{ display:'flex', flexWrap:'wrap', gap:7 }}>
              {g.emotions.map((e, ei) => (
                <div key={ei} style={{
                  padding:'9px 16px', borderRadius:100,
                  background:g.grad, color:g.text, fontWeight:700, fontSize:14,
                }}>{e}</div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ─── APP ───────────────────────────────────────────────────── */
function App() {
  const [screen, setScreen] = React.useState('welcome');
  const [emotionData, setEmotionData] = React.useState(null);
  const [showList, setShowList] = React.useState(false);

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%', position:'relative' }}>
      {screen === 'welcome' && <WelcomeScreen onStart={() => setScreen('emotion')} />}
      {screen === 'emotion' && (
        <EmotionScreen
          onScenePhase={d => { setEmotionData(d); setScreen('scene'); }}
          onListOpen={() => setShowList(true)}
        />
      )}
      {screen === 'scene' && emotionData && (
        <SceneScreen
          emotionData={emotionData}
          onRestart={() => { setEmotionData(null); setScreen('emotion'); }}
          onListOpen={() => setShowList(true)}
        />
      )}
      {showList && <EmotionListOverlay onClose={() => setShowList(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

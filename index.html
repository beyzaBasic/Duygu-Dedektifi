function shuffle(arr) {
  const a = [...arr]; for (let i = a.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a;
}
function pickRandom(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

/* ─── RAINBOW RINGS ────────────────────────────────────────── */
function RainbowRings({ size = 14 }) {
  return (
    <span style={{
      display:'inline-block', width:size, height:size, borderRadius:'50%',
      background:'#FF4757',
      boxShadow:`0 0 0 ${size*0.18}px #FF8C42,0 0 0 ${size*0.35}px #FFC93C,0 0 0 ${size*0.53}px #2ED573,0 0 0 ${size*0.71}px #2E9CFF,0 0 0 ${size*0.88}px #3D5AFE,0 0 0 ${size*1.05}px #B14AED`
    }} />
  );
}

/* ─── DECK VISUAL ──────────────────────────────────────────── */
function DeckVisual({ label, sub, icon, onClick, faded = false }) {
  const [hovered, setHovered] = React.useState(false);
  return (
    <div
      onClick={onClick}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{
        position:'relative', width:200, height:280,
        cursor:'pointer', userSelect:'none',
        opacity: faded ? 0 : 1,
        transition:'opacity 0.4s',
      }}
    >
      {/* Background cards */}
      {[
        { r:-6, tx:-10, ty:6, op:0.45 },
        { r: 4, tx: 8,  ty:3, op:0.65 },
      ].map((c,i) => (
        <div key={i} style={{
          position:'absolute', inset:0, borderRadius:20,
          background:'#fff', border:'1px solid rgba(0,0,0,0.07)',
          transform:`rotate(${c.r}deg) translate(${c.tx}px,${c.ty}px)`,
          opacity:c.op,
        }}/>
      ))}
      {/* Top card */}
      <div style={{
        position:'absolute', inset:0, borderRadius:20,
        background:'#fff', border:'1px solid rgba(0,0,0,0.06)',
        display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:14,
        boxShadow:'0 24px 48px -16px rgba(0,0,0,0.14)',
        transform: hovered ? 'translateY(-8px)' : 'translateY(0)',
        transition:'transform 0.3s cubic-bezier(0.2,0.8,0.2,1)',
      }}>
        <div style={{
          width:60, height:60, borderRadius:'50%',
          background:'#1A1A1A', color:'#fff',
          display:'flex', alignItems:'center', justifyContent:'center',
          fontSize:26, fontWeight:900, fontFamily:'Nunito',
        }}>{icon}</div>
        <div style={{ textAlign:'center' }}>
          <div style={{ fontWeight:900, fontSize:20, color:'#1A1A1A', lineHeight:1.1 }}>{label}</div>
          <div style={{ fontSize:9, letterSpacing:'0.25em', color:'#A0A0A0', textTransform:'uppercase', marginTop:8 }}>{sub}</div>
        </div>
      </div>
    </div>
  );
}

/* ─── EMOTION CARD ─────────────────────────────────────────── */
function EmotionCard({ emotion, group, onShown }) {
  const [revealed, setRevealed] = React.useState(false);
  const [entered, setEntered] = React.useState(false);

  React.useEffect(() => {
    const t = setTimeout(() => { setEntered(true); if (onShown) onShown(); }, 50);
    return () => clearTimeout(t);
  }, []);

  const fontSize = emotion.length > 10 ? 30 : emotion.length > 7 ? 38 : 48;

  return (
    <div
      onMouseDown={() => setRevealed(true)}
      onMouseUp={() => setRevealed(false)}
      onMouseLeave={() => setRevealed(false)}
      onTouchStart={() => setRevealed(true)}
      onTouchEnd={() => setRevealed(false)}
      style={{
        width:220, height:308, borderRadius:24,
        background: group.grad,
        display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
        position:'relative', overflow:'hidden',
        boxShadow:'0 32px 64px -24px rgba(0,0,0,0.3)',
        userSelect:'none', cursor:'pointer', touchAction:'none',
        transform: entered ? 'translateY(0) scale(1)' : 'translateY(20px) scale(0.96)',
        opacity: entered ? 1 : 0,
        transition:'transform 0.5s cubic-bezier(0.2,0.8,0.2,1), opacity 0.5s',
      }}
    >
      {/* Emotion name */}
      <div style={{
        color: group.text, fontWeight:900, fontSize, lineHeight:1, textAlign:'center', padding:'0 20px',
        filter: revealed ? 'blur(0)' : 'blur(20px)',
        transition: revealed ? 'filter 0.15s' : 'filter 0.4s',
      }}>{emotion}</div>

      {/* Reveal overlay */}
      <div style={{
        position:'absolute', inset:0,
        display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:10,
        opacity: revealed ? 0 : 1,
        transition:'opacity 0.2s',
        pointerEvents:'none',
      }}>
        <div style={{
          width:40, height:40, borderRadius:'50%',
          border:`1.5px solid ${group.text === 'white' ? 'rgba(255,255,255,0.8)' : 'rgba(58,42,0,0.6)'}`,
          display:'flex', alignItems:'center', justifyContent:'center',
        }}>
          <div style={{
            width:11, height:11, borderRadius:'50%',
            background: group.text === 'white' ? 'rgba(255,255,255,0.8)' : 'rgba(58,42,0,0.6)',
          }}/>
        </div>
        <div style={{
          fontSize:9, letterSpacing:'0.22em', textTransform:'uppercase', textAlign:'center',
          color: group.text === 'white' ? 'rgba(255,255,255,0.85)' : 'rgba(58,42,0,0.65)',
          lineHeight:1.5,
        }}>Görmek için<br />dokun &amp; tut</div>
      </div>
    </div>
  );
}

/* ─── MINI CHIP ────────────────────────────────────────────── */
function MiniChip({ emotion, group }) {
  const [peeking, setPeeking] = React.useState(false);
  return (
    <div
      onMouseDown={() => setPeeking(true)} onMouseUp={() => setPeeking(false)} onMouseLeave={() => setPeeking(false)}
      onTouchStart={() => setPeeking(true)} onTouchEnd={() => setPeeking(false)}
      style={{
        display:'flex', alignItems:'center', gap:10,
        padding:'8px 18px 8px 8px', borderRadius:100,
        background:'#fff', border:'1px solid rgba(0,0,0,0.09)',
        cursor:'pointer', userSelect:'none', touchAction:'none',
        boxShadow:'0 4px 12px -4px rgba(0,0,0,0.08)',
      }}
    >
      <div style={{
        width:34, height:34, borderRadius:'50%', background:group.grad, flexShrink:0,
        filter: peeking ? 'blur(0)' : 'blur(8px)',
        transition: peeking ? 'filter 0.1s' : 'filter 0.3s',
      }}/>
      <span style={{
        fontWeight:700, fontStyle:'italic', fontSize:16, color:'#1A1A1A',
        filter: peeking ? 'blur(0)' : 'blur(5px)',
        transition: peeking ? 'filter 0.1s' : 'filter 0.3s',
      }}>{emotion}</span>
    </div>
  );
}

/* ─── SCENE CARD ───────────────────────────────────────────── */
function SceneCard({ scene, visible }) {
  const [entered, setEntered] = React.useState(false);
  React.useEffect(() => {
    if (visible) { const t = setTimeout(() => setEntered(true), 60); return () => clearTimeout(t); }
    else setEntered(false);
  }, [visible, scene]);

  return (
    <div style={{
      background:'#fff', borderRadius:24, padding:'28px 24px',
      boxShadow:'0 16px 40px -16px rgba(0,0,0,0.1)',
      width:'100%',
      transform: entered ? 'translateY(0)' : 'translateY(16px)',
      opacity: entered ? 1 : 0,
      transition:'transform 0.45s cubic-bezier(0.2,0.8,0.2,1), opacity 0.45s',
    }}>
      <div style={{ fontSize:9, letterSpacing:'0.25em', color:'#A0A0A0', textTransform:'uppercase', marginBottom:10 }}>
        SAHNE №{String(scene.no).padStart(2,'0')}
      </div>
      <h2 style={{ fontWeight:900, fontSize:22, lineHeight:1.15, letterSpacing:'-0.01em', color:'#1A1A1A', marginBottom:14 }}>
        {scene.title}
      </h2>
      <p style={{ fontSize:16, lineHeight:1.65, color:'#5A5A5A', marginBottom:20 }}>
        {scene.body}
      </p>
      <div style={{ width:28, height:2.5, background:'#1A1A1A', borderRadius:2, marginBottom:18 }}/>
      <p style={{ fontSize:16, lineHeight:1.6, color:'#1A1A1A', fontStyle:'italic', fontWeight:600 }}>
        {scene.q}
      </p>
    </div>
  );
}

/* ─── EMOTION LIST OVERLAY ─────────────────────────────────── */
function EmotionListOverlay({ onClose }) {
  const [activeGroup, setActiveGroup] = React.useState(0);
  const [visible, setVisible] = React.useState(false);
  React.useEffect(() => { const t = setTimeout(() => setVisible(true), 30); return () => clearTimeout(t); }, []);

  const g = GROUPS[activeGroup];

  return (
    <div style={{
      position:'absolute', inset:0, borderRadius:52,
      background:'#FAF7F2', overflow:'hidden', display:'flex', flexDirection:'column',
      transform: visible ? 'translateY(0)' : 'translateY(100%)',
      transition:'transform 0.4s cubic-bezier(0.2,0.8,0.2,1)',
      zIndex:100,
    }}>
      {/* Header */}
      <div style={{ padding:'16px 20px 0', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div style={{ fontWeight:900, fontSize:18, color:'#1A1A1A' }}>Duygu Havuzu</div>
        <button onClick={onClose} style={{
          width:36, height:36, borderRadius:'50%', background:'rgba(0,0,0,0.07)',
          border:'none', fontSize:18, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center',
          color:'#1A1A1A',
        }}>×</button>
      </div>

      {/* Color tabs */}
      <div style={{ display:'flex', gap:8, padding:'16px 20px 12px', overflowX:'auto' }}>
        {GROUPS.map((gr, i) => (
          <button key={i} onClick={() => setActiveGroup(i)} style={{
            flexShrink:0, padding:'7px 14px', borderRadius:100,
            background: activeGroup===i ? gr.grad : 'transparent',
            border: activeGroup===i ? 'none' : '1px solid rgba(0,0,0,0.12)',
            color: activeGroup===i ? gr.text : '#5A5A5A',
            fontWeight:700, fontSize:12, cursor:'pointer',
            fontFamily:'Nunito',
          }}>{gr.name}</button>
        ))}
      </div>

      {/* Family label */}
      <div style={{ padding:'0 20px 14px' }}>
        <span style={{
          fontSize:9, letterSpacing:'0.2em', textTransform:'uppercase', color:'#A0A0A0', fontWeight:700,
        }}>{g.family} · {g.emotions.length} duygu</span>
      </div>

      {/* Emotions grid */}
      <div style={{ flex:1, overflowY:'auto', padding:'0 20px 24px', display:'flex', flexWrap:'wrap', gap:10, alignContent:'flex-start' }}>
        {g.emotions.map((e, i) => (
          <div key={i} style={{
            padding:'10px 16px', borderRadius:100,
            background: g.grad,
            color: g.text,
            fontWeight:700, fontSize:15,
          }}>{e}</div>
        ))}
      </div>
    </div>
  );
}

function Btn({ children, onClick, ghost, small }) {
  const [hov, setHov] = React.useState(false);
  return (
    <button
      onClick={onClick}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{
        fontFamily:'Nunito', fontWeight:700, cursor:'pointer',
        fontSize: small ? 10 : 11,
        letterSpacing:'0.18em', textTransform:'uppercase',
        padding: small ? '11px 20px' : '14px 28px',
        borderRadius:100,
        background: ghost ? 'transparent' : '#1A1A1A',
        color: ghost ? '#5A5A5A' : '#fff',
        border: ghost ? '1px solid rgba(0,0,0,0.13)' : 'none',
        transform: hov ? 'translateY(-2px)' : 'translateY(0)',
        transition:'transform 0.2s, box-shadow 0.2s',
        boxShadow: hov && !ghost ? '0 8px 20px -6px rgba(0,0,0,0.35)' : 'none',
      }}
    >{children}</button>
  );
}

/* ─── SCREENS ──────────────────────────────────────────────── */

function WelcomeScreen({ onStart }) {
  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', flex:1, gap:0, padding:'32px 28px' }}>
      {/* Logo area */}
      <div style={{ marginBottom:36, display:'flex', flexDirection:'column', alignItems:'center', gap:20 }}>
        <RainbowRings size={18} />
        <div style={{ textAlign:'center' }}>
          <div style={{ fontWeight:900, fontSize:34, letterSpacing:'-0.025em', color:'#1A1A1A', lineHeight:1 }}>
            Duygu
          </div>
          <div style={{ fontWeight:400, fontStyle:'italic', fontSize:34, letterSpacing:'-0.01em', color:'#5A5A5A', lineHeight:1 }}>
            Dedektifi
          </div>
        </div>
        <div style={{ fontSize:10, letterSpacing:'0.22em', color:'#A0A0A0', textTransform:'uppercase' }}>
          Sahne · Duygu · Tahmin
        </div>
      </div>

      {/* Color swatches preview */}
      <div style={{ display:'flex', gap:6, marginBottom:48 }}>
        {GROUPS.map((g,i) => (
          <div key={i} style={{
            width:28, height:28, borderRadius:'50%',
            background: g.grad,
            boxShadow:'0 4px 10px -3px rgba(0,0,0,0.2)',
          }}/>
        ))}
      </div>

      {/* How to play */}
      <div style={{ background:'#fff', borderRadius:20, padding:'22px 20px', marginBottom:40, width:'100%' }}>
        <div style={{ fontSize:9, letterSpacing:'0.22em', textTransform:'uppercase', color:'#A0A0A0', marginBottom:14, fontWeight:700 }}>Nasıl oynanır</div>
        {[
          ['1', 'Duygu çek', 'Kart bulanık gelir — sadece sen görürsün'],
          ['2', 'Sahneyi oku', 'Sahneyi duygunla yorumla, soruyu cevapla'],
          ['3', 'Tahmin', 'Diğerleri senin duygunun ne olduğunu bulmalı'],
        ].map(([n, t, d]) => (
          <div key={n} style={{ display:'flex', gap:12, alignItems:'flex-start', marginBottom: n==='3' ? 0 : 14 }}>
            <div style={{
              width:26, height:26, borderRadius:'50%', background:'#1A1A1A',
              color:'#fff', fontSize:12, fontWeight:900,
              display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0,
            }}>{n}</div>
            <div>
              <div style={{ fontWeight:800, fontSize:14, color:'#1A1A1A' }}>{t}</div>
              <div style={{ fontSize:12, color:'#5A5A5A', marginTop:2, lineHeight:1.4 }}>{d}</div>
            </div>
          </div>
        ))}
      </div>

      <Btn onClick={onStart}>Oyuna Başla</Btn>
    </div>
  );
}

function EmotionScreen({ onScenePhase, onListOpen }) {
  const [phase, setPhase] = React.useState('deck'); // deck | drawn | ready
  const [emotion, setEmotion] = React.useState(null);
  const [group, setGroup] = React.useState(null);
  const [shuffled] = React.useState(() => {
    const all = GROUPS.flatMap(g => g.emotions.map(e => ({ emotion:e, group:g })));
    return shuffle(all);
  });
  const [idx, setIdx] = React.useState(0);

  function draw() {
    const item = shuffled[idx % shuffled.length];
    setEmotion(item.emotion); setGroup(item.group); setPhase('drawn');
  }
  function redraw() {
    const next = (idx + 1) % shuffled.length;
    setIdx(next);
    const item = shuffled[next];
    setEmotion(item.emotion); setGroup(item.group); setPhase('drawn');
  }
  function goScene() { onScenePhase({ emotion, group }); }

  const bgColor = group ? group.tint : '#FAF7F2';

  return (
    <div style={{
      display:'flex', flexDirection:'column', flex:1,
      background: bgColor,
      transition:'background 0.8s cubic-bezier(0.2,0.8,0.2,1)',
      position:'relative',
    }}>
      {/* Header */}
      <div style={{ padding:'16px 20px 0', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div>
          <div style={{ fontWeight:900, fontSize:18, letterSpacing:'-0.02em', color:'#1A1A1A' }}>
            Duygu <em style={{ fontWeight:400, color:'#5A5A5A' }}>Dedektifi</em>
          </div>
        </div>
        <button onClick={onListOpen} style={{
          width:40, height:40, borderRadius:'50%',
          background:'#fff', border:'1px solid rgba(0,0,0,0.08)',
          display:'flex', alignItems:'center', justifyContent:'center',
          cursor:'pointer', boxShadow:'0 4px 12px -4px rgba(0,0,0,0.1)',
        }}>
          <RainbowRings size={12} />
        </button>
      </div>

      {/* Step dots */}
      <div style={{ display:'flex', gap:8, justifyContent:'center', padding:'14px 0 0' }}>
        <div style={{ width:7, height:7, borderRadius:'50%', background:'#1A1A1A', transform:'scale(1.4)', transition:'all 0.3s' }}/>
        <div style={{ width:7, height:7, borderRadius:'50%', background:'#1A1A1A', opacity:0.2 }}/>
      </div>

      {/* Main content */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'20px 24px', gap:28 }}>

        {/* Instruction */}
        <div style={{ textAlign:'center' }}>
          <h1 style={{ fontWeight:400, fontStyle:'italic', fontSize:28, color:'#1A1A1A', marginBottom:8, lineHeight:1 }}>
            {phase === 'deck' ? 'Duygunu çek.' : 'Duygunla hazırlan.'}
          </h1>
          <p style={{ fontSize:12, color:'#5A5A5A', lineHeight:1.6, maxWidth:260 }}>
            {phase === 'deck'
              ? 'Desteye dokun, rastgele bir duygu atansın.'
              : 'Basılı tutarak sadece sen görebilirsin.'}
          </p>
        </div>

        {/* Card or deck */}
        {phase === 'deck' ? (
          <DeckVisual icon="?" label="Duygu Destesi" sub="70 Kart" onClick={draw} />
        ) : (
          <EmotionCard emotion={emotion} group={group} onShown={() => setPhase('ready')} />
        )}
      </div>

      {/* Actions */}
      <div style={{ padding:'0 24px 28px', display:'flex', gap:10, justifyContent:'center', flexWrap:'wrap' }}>
        {phase === 'ready' && (
          <>
            <Btn ghost small onClick={redraw}>Başka Kart</Btn>
            <Btn small onClick={goScene}>Sahne Zamanı →</Btn>
          </>
        )}
      </div>
    </div>
  );
}

function SceneScreen({ emotionData, onRestart, onListOpen }) {
  const { emotion, group } = emotionData;
  const [shuffled] = React.useState(() => shuffle(SCENES));
  const [idx, setIdx] = React.useState(0);
  const scene = shuffled[idx % shuffled.length];
  const [key, setKey] = React.useState(0);

  function redraw() { setIdx(i => i+1); setKey(k => k+1); }

  return (
    <div style={{ display:'flex', flexDirection:'column', flex:1, background:'#FAF7F2', position:'relative' }}>

      {/* Header */}
      <div style={{ padding:'16px 20px 0', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div>
          <div style={{ fontWeight:900, fontSize:18, letterSpacing:'-0.02em', color:'#1A1A1A' }}>
            Duygu <em style={{ fontWeight:400, color:'#5A5A5A' }}>Dedektifi</em>
          </div>
        </div>
        <button onClick={onListOpen} style={{
          width:40, height:40, borderRadius:'50%',
          background:'#fff', border:'1px solid rgba(0,0,0,0.08)',
          display:'flex', alignItems:'center', justifyContent:'center',
          cursor:'pointer', boxShadow:'0 4px 12px -4px rgba(0,0,0,0.1)',
        }}>
          <RainbowRings size={12} />
        </button>
      </div>

      {/* Step dots */}
      <div style={{ display:'flex', gap:8, justifyContent:'center', padding:'14px 0 0' }}>
        <div style={{ width:7, height:7, borderRadius:'50%', background:'#1A1A1A', opacity:0.4 }}/>
        <div style={{ width:7, height:7, borderRadius:'50%', background:'#1A1A1A', transform:'scale(1.4)', transition:'all 0.3s' }}/>
      </div>

      {/* Scrollable content */}
      <div style={{ flex:1, overflowY:'auto', padding:'20px 20px 0', display:'flex', flexDirection:'column', gap:16 }}>

        {/* Mini chip */}
        <div style={{ display:'flex', justifyContent:'center' }}>
          <MiniChip emotion={emotion} group={group} />
        </div>

        {/* Instruction */}
        <div style={{ textAlign:'center' }}>
          <h1 style={{ fontWeight:400, fontStyle:'italic', fontSize:26, color:'#1A1A1A', marginBottom:6, lineHeight:1 }}>
            Sahneyi aç.
          </h1>
          <p style={{ fontSize:12, color:'#5A5A5A', lineHeight:1.55 }}>
            Sahneyi oku, duyguyu üzerine giydir,<br/>soruyu cevapla.
          </p>
        </div>

        {/* Scene card */}
        <SceneCard key={key} scene={scene} visible={true} />

        <div style={{ height:16 }}/>
      </div>

      {/* Actions */}
      <div style={{ padding:'12px 24px 24px', display:'flex', gap:10, justifyContent:'center', flexWrap:'wrap',
        borderTop:'1px solid rgba(0,0,0,0.06)', background:'#FAF7F2' }}>
        <Btn ghost small onClick={redraw}>Başka Sahne</Btn>
        <Btn ghost small onClick={onRestart}>Yeni Tur</Btn>
      </div>
    </div>
  );
}

/* ─── APP ──────────────────────────────────────────────────── */
function App() {
  const [screen, setScreen] = React.useState('welcome'); // welcome | emotion | scene
  const [emotionData, setEmotionData] = React.useState(null);
  const [showList, setShowList] = React.useState(false);

  function goScene(data) { setEmotionData(data); setScreen('scene'); }
  function restart() { setEmotionData(null); setScreen('emotion'); }

  return (
    <PhoneFrame>
      <div style={{
        display:'flex', flexDirection:'column',
        width:'100%', height:'100%',
        background:'#FAF7F2',
        fontFamily:'Nunito, system-ui, sans-serif',
        overflow:'hidden', position:'relative',
      }}>
        {screen === 'welcome' && (
          <WelcomeScreen onStart={() => setScreen('emotion')} />
        )}
        {screen === 'emotion' && (
          <EmotionScreen
            onScenePhase={goScene}
            onListOpen={() => setShowList(true)}
          />
        )}
        {screen === 'scene' && emotionData && (
          <SceneScreen
            emotionData={emotionData}
            onRestart={restart}
            onListOpen={() => setShowList(true)}
          />
        )}

        {/* Emotion list overlay */}
        {showList && (
          <div style={{ position:'absolute', inset:0, zIndex:99 }}>
            <EmotionListOverlay onClose={() => setShowList(false)} />
          </div>
        )}
      </div>
    </PhoneFrame>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
